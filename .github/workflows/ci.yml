# Generated by SKILL-IOS (OP-2123).
#
# CI keeps the cheap SwiftPM package loop on Ubuntu for every change.
# The paid macOS simulator lane is label-gated with `ci:macos` and also
# runs for merge queue entries.

name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
  IOS_SIMULATOR_DESTINATION: platform=iOS Simulator,name=iPhone 15,OS=latest

jobs:
  swiftpm:
    name: swift test (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.9"
      - name: swift test
        run: swift test --package-path .

  xcodegen-simulator:
    name: XcodeGen build + test (macOS)
    if: >-
      ${{
        github.event_name == 'merge_group' ||
        github.event_name == 'workflow_dispatch' ||
        contains(github.event.pull_request.labels.*.name, 'ci:macos')
      }}
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: select pinned Xcode
        run: |
          set -euo pipefail
          test -d "$DEVELOPER_DIR"
          xcodebuild -version

      - name: install XcodeGen
        run: brew install xcodegen

      - name: generate Xcode project
        run: xcodegen generate

      - name: boot simulator
        run: |
          set -euo pipefail
          xcrun simctl boot "iPhone 15" || true
          xcrun simctl bootstatus booted -b

      - name: grant location permission
        run: xcrun simctl privacy booted grant location-when-in-use com.limit5.mapar

      - name: xcodebuild build and test
        run: |
          set -euo pipefail
          xcodebuild \
            -project MapAR.xcodeproj \
            -scheme MapAR \
            -destination "$IOS_SIMULATOR_DESTINATION" \
            CODE_SIGN_IDENTITY= \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build test
