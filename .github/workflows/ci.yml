# Generated by SKILL-IOS (OP-2123).
#
# CI keeps the cheap SwiftPM package loop on Ubuntu for every change.
# The paid macOS simulator lane is label-gated with `ci:macos` and also
# runs for merge queue entries.

name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEVELOPER_DIR: /Applications/Xcode_16.2.app/Contents/Developer
  # device picked dynamically in the job (image-proof)

jobs:
  swiftpm:
    name: swift test (Ubuntu)
    runs-on: ubuntu-latest
    container: swift:6.1
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: swift test
        run: swift test --package-path .
      - name: swift test (local packages)
        # Local SwiftPM packages (e.g. Modules/MapARCore) are separate
        # manifests — root `swift test` does not run their suites.
        run: |
          for p in Modules/*/Package.swift; do
            [ -e "$p" ] || continue
            swift test --package-path "$(dirname "$p")"
          done

  xcodegen-simulator:
    name: XcodeGen build + test (macOS)
    if: >-
      ${{
        github.event_name == 'merge_group' ||
        github.event_name == 'workflow_dispatch' ||
        contains(github.event.pull_request.labels.*.name, 'ci:macos')
      }}
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: select pinned Xcode
        run: |
          set -euo pipefail
          test -d "$DEVELOPER_DIR"
          xcodebuild -version

      - name: install XcodeGen
        run: brew install xcodegen

      - name: generate Xcode project
        run: xcodegen generate

      - name: pick + boot simulator
        run: |
          set -euo pipefail
          UDID=$(xcrun simctl list devices available | grep -E 'iPhone' | grep -oE '[0-9A-F-]{36}' | head -1)
          NAME=$(xcrun simctl list devices available | grep "$UDID" | sed 's/ (.*//' | xargs)
          echo "picked simulator: $NAME ($UDID)"
          echo "IOS_SIM_UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: grant location permission
        run: xcrun simctl privacy "$IOS_SIM_UDID" grant location-when-in-use com.limit5.mapar || echo "::warning::privacy grant skipped (best-effort until location UI tests land)"

      - name: xcodebuild build and test
        run: |
          set -euo pipefail
          xcodebuild \
            -project MapAR.xcodeproj \
            -scheme MapAR \
            -destination "id=$IOS_SIM_UDID" \
            CODE_SIGN_IDENTITY= \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build test
