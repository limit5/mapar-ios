# ios-map-ar (OP-2124) - XcodeGen spec with local MapARCore package wiring.
#
# Mirrors the SKILL-IOS XcodeGen layout, then adds the local SwiftPM
# package used by the MapKit/ARKit overlay.

name: MapAR
options:
  bundleIdPrefix: com.limit5
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  groupSortPosition: top
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: 5.9
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_STRICT_CONCURRENCY: complete
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: -Onone
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    Release:
      SWIFT_OPTIMIZATION_LEVEL: -O

packages:
  MapARCore:
    path: Modules/MapARCore

targets:
  MapAR:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - App/Sources
    resources:
      - App/Resources

    info:
      path: App/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.limit5.mapar
        INFOPLIST_FILE: App/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Resources/App.entitlements
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
    configFiles:
      Debug: Configs/Common.xcconfig
      Release: Configs/Common.xcconfig
    dependencies:
      - package: MapARCore
        product: MapARCore

  MapARTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests
    dependencies:
      - target: MapAR
      - package: MapARCore
        product: MapARCore

  MapARUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - UITests
    dependencies:
      - target: MapAR

schemes:
  MapAR:
    build:
      targets:
        MapAR: all
        MapARTests: [test]
        MapARUITests: [test]
    test:
      targets:
        - MapARTests
        - MapARUITests

    run:
      config: Debug
    archive:
      config: Release
